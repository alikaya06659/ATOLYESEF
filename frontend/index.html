<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Detector | Yapay Zeka Tespit Sistemi</title>
    <meta name="description" content="İçeriklerinizin yapay zeka tarafından mı yoksa insan tarafından mı üretildiğini gelişmiş algoritmalarla analiz edin.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Glows -->
    <div style="position: fixed; top: 10%; left: 10%; width: 40vw; height: 40vw; background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%); z-index: -1; pointer-events: none; filter: blur(60px);"></div>
    <div style="position: fixed; bottom: 10%; right: 10%; width: 30vw; height: 30vw; background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 70%); z-index: -1; pointer-events: none; filter: blur(60px);"></div>

    <div class="container">
        <h1>AI Detector</h1>
        <p class="subtitle">Metin, Görsel veya Video içeriklerini yapay zeka analizinden geçirin</p>

        <div class="upload-section">
            <div class="input-group" id="drop-zone">
                <textarea id="text-input" placeholder="Analiz edilecek metni buraya yapıştırın veya bir dosya sürükleyip bırakın..."></textarea>
                
                <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                    <label for="file-input" style="cursor: pointer; color: var(--primary); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Dosya Yükle
                    </label>
                    <input type="file" id="file-input" style="display: none;">
                    <span id="file-name" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 300;"></span>
                </div>
            </div>

            <div class="controls">
                <div class="toggle-group">
                    <span class="toggle-label">Derin Analiz Modu</span>
                    <label class="switch">
                        <input type="checkbox" id="mode-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="btn-group">
                    <button id="reset-btn" class="secondary-btn">Temizle</button>
                    <button id="analyze-btn">Analizi Başlat</button>
                </div>
            </div>
        </div>

        <div id="result-card" class="result-card">
            <div class="message" id="result-msg">Analiz Tamamlandı</div>
            <div class="percentage" id="result-score">0%</div>
            <p id="result-type" style="color: var(--text-muted); font-size: 1rem; font-weight: 300; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="history-section">
        <div class="history-header">
            <h2>Geçmiş Analizler</h2>
            <button id="refresh-history" class="secondary-btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Yenile</button>
        </div>
        <div id="history-list">
            <!-- Geçmiş buraya dinamik olarak gelecek -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

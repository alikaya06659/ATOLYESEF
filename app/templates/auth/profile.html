<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Profil{% endblock %} - AtölyeŞef</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>
    {% extends "base.html" %}
    {% block content %}
    <div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">
        <div class="card shadow-sm" style="width: 24rem;">
            <div class="card-body">
                <h5 class="card-title text-center mb-4">Profil</h5>
                <p><strong>Kullanıcı Adı:</strong> {{ user.username }}</p>
                <p><strong>E‑posta:</strong> {{ user.email }}</p>
                <p><strong>Kayıt Tarihi:</strong> {{ user.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-danger w-100 mt-3">Çıkış Yap</a>
            </div>
        </div>
    </div>
    {% endblock %}
</body>
</html>
